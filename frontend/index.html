<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kapil vs Divya | Learning Race</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Manrope:wght@400;600;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="bg-orb orb-1"></div>
  <div class="bg-orb orb-2"></div>

  <main class="app-shell">
    <header class="hero">
      <p class="badge">Milestone Reward Challenge</p>
      <h1>Kapil vs Divya</h1>
      <p class="subtext">
        New class + revised class + resolved tickets = points. Keep racing and unlock rewards at each milestone.
      </p>
      <div class="legend">
        <span><i class="dot dot-gold"></i> New Class: +3</span>
        <span><i class="dot dot-blue"></i> Revision: +2</span>
        <span><i class="dot dot-red"></i> Ticket Resolved: +4</span>
      </div>
    </header>

    <section class="scoreboard" id="scoreboard"></section>

    <section class="milestone-panel">
      <h2>Milestones & Rewards</h2>
      <div id="milestoneList" class="milestone-list"></div>
    </section>
  </main>

  <div id="rewardToast" class="reward-toast hidden"></div>

  <script src="app.js"></script>
</body>
</html>
